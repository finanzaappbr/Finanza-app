<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanZa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <div class="app">

        <h1>FinanZa</h1>
        <p class="subtitle">Controle financeiro simples</p>

        <div class="resumo">

            <div class="card">
                <span>Entradas</span>
                <strong id="entradas">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Saídas</span>
                <strong id="saidas">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Reserva</span>
                <input type="text" id="inputGuardado" placeholder="R$ 0,00" oninput="digitandoGuardado()"
                    onblur="formatarGuardado()">
            </div>

            <div class="card destaque">
                <span>Disponível</span>
                <strong id="saldo">R$ 0,00</strong>
            </div>

        </div>

        <div class="meta-card">
            <span>Meta de Reserva do Mês</span>
            <input type="number" id="meta" placeholder="Ex: 1000" oninput="salvarMeta()">

            <div class="barra">
                <div id="progresso"></div>
            </div>

            <small id="textoMeta">Defina uma meta</small>
        </div>

        <ul id="lista"></ul>

    </div>

    <button class="fab" onclick="abrirModal()">+</button>

    <div id="modal" class="modal">
        <div class="modal-content">

            <h2>Nova Transação</h2>

            <input type="text" id="descricao" placeholder="Ex: Venda do dia">
            <input type="number" id="valor" placeholder="Ex: 150">

            <select id="tipo">
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
            </select>

            <select id="categoria">
                <option value="Geral">Geral</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Fornecedor">Fornecedor</option>
                <option value="Salário">Salário</option>
                <option value="Marketing">Marketing</option>
            </select>

            <button type="button" onclick="adicionar()">Salvar</button>
            <button type="button" onclick="fecharModal()" class="cancelar">Cancelar</button>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>

</body>

</html>
